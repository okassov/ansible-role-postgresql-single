---
name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  molecule:
    name: Molecule Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "ansible<12" molecule molecule-docker docker

      - name: Install required Ansible collections
        run: |
          ansible-galaxy collection install community.postgresql community.general community.docker

      - name: Run Molecule tests
        run: molecule test
